name: weekly-fund-report
on:
  # 主触发：由外部可靠调度器（cron-job.org / VPS crontab 等）每周六到点调用 GitHub API
  # 派发 repository_dispatch(event_type=weekly-trigger)。GitHub 的执行引擎可靠，不可靠的
  # 只是它内置的 schedule cron——把"定时"交给外部，触发延迟从几十分钟/丢弃降到几秒。
  # repository_dispatch 会走 main.py --check 的判重 + 周六守卫（与 schedule 同路径），
  # 因此非周六/本周已出会自动跳过，安全幂等。
  repository_dispatch:
    types: [weekly-trigger]
  # 兜底：万一外部调度器宕机，仍保留少量周六 schedule 槽位。GitHub 定时是"尽力而为"，
  # 高峰期常延迟甚至跳过，故只稀疏留几个非整点槽位（避开 :00/:30 高峰），命中其一即可，
  # 其余靠判重跳过。注意：① 槽位不能早过 UTC 00:00（周六），否则跨到周五、被周六守卫判跳过；
  #         ② day-of-week 用 6（周六）。
  schedule:
    - cron: "5 0 * * 6"     # 北京周六 08:05（贴着 0 点又避开正点高峰）
    - cron: "26 0 * * 6"    # 北京周六 08:26 兜底
    - cron: "53 0 * * 6"    # 北京周六 08:53 兜底
    - cron: "23 1 * * 6"    # 北京周六 09:23 兜底
    - cron: "47 1 * * 6"    # 北京周六 09:47 兜底（最后一道）
  workflow_dispatch:          # 手动触发（测试用，跳过守卫与判重检查）

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装中文字体与依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra
          pip install -r requirements.txt

      # 判重 + 周六守卫：兜底槽位空跑时 run=false，闸住后续全部步骤。
      # 一周只出一期；非周六跳过；手动触发(workflow_dispatch)一律放行。
      - name: 判重 + 周六守卫
        id: guard
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py --check >> "$GITHUB_OUTPUT"

      - name: 筛选 + 评分 + 生成素材（周更不跑回测：回测为固定历史验证，逐窗口串行抓 NAV 太慢会超时）
        if: steps.guard.outputs.run == 'true'
        run: python main.py --no-backtest

      - name: 合成播报视频（TTS 失败不阻塞）
        if: steps.guard.outputs.run == 'true'
        continue-on-error: true
        run: python video.py

      - name: 推送到企业微信 / Telegram
        if: steps.guard.outputs.run == 'true'
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python notify.py

      - name: 保存本期榜单快照（供下周对比"新进/名次变动"；推送失败不阻塞）
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name "fund-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "snapshot $(date +%F)" || echo "no changes"
          git push || echo "::warning::快照推送失败，请检查 Settings→Actions→Workflow permissions 为 Read and write"

      - uses: actions/upload-artifact@v4
        if: always() && steps.guard.outputs.run == 'true'
        with:
          name: fund-report-${{ github.run_id }}
          path: output/
          retention-days: 30
