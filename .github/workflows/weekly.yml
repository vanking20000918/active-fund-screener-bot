name: weekly-fund-report
on:
  # 注意：槽位不能早过 UTC 00:00，否则跨到前一个 UTC 日，交易日判断与快照日期会错位。
  schedule:
    - cron: "14 0 * * 1-5"   # UTC 00:14 ≈ 北京 08:14（主槽，贴着 0 点又避开正点高峰）
    - cron: "33 0 * * 1-5"   # 北京 08:33 兜底
    - cron: "57 0 * * 1-5"   # 北京 08:57 兜底
    - cron: "21 1 * * 1-5"   # 北京 09:21 兜底
    - cron: "47 1 * * 1-5"   # 北京 09:47 兜底（最后一道）
  workflow_dispatch:          # 手动触发（测试用，跳过交易日与判重检查）

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 安装中文字体与依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk fonts-noto-cjk-extra
          pip install -r requirements.txt

      # 判重 + 交易日守卫：兜底槽位空跑时 run=false，闸住后续全部步骤。
      # 一周只出一期；非交易日跳过；手动触发(workflow_dispatch)一律放行。
      - name: 判重 + 交易日守卫
        id: guard
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: python main.py --check >> "$GITHUB_OUTPUT"

      - name: 筛选 + 评分 + 生成素材（周更不跑回测：回测为固定历史验证，逐窗口串行抓 NAV 太慢会超时）
        if: steps.guard.outputs.run == 'true'
        run: python main.py --no-backtest

      - name: 合成播报视频（TTS 失败不阻塞）
        if: steps.guard.outputs.run == 'true'
        continue-on-error: true
        run: python video.py

      - name: 推送到企业微信 / Telegram
        if: steps.guard.outputs.run == 'true'
        env:
          WECOM_WEBHOOK: ${{ secrets.WECOM_WEBHOOK }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python notify.py

      - name: 保存本期榜单快照（供下周对比"新进/名次变动"；推送失败不阻塞）
        if: steps.guard.outputs.run == 'true'
        run: |
          git config user.name "fund-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git commit -m "snapshot $(date +%F)" || echo "no changes"
          git push || echo "::warning::快照推送失败，请检查 Settings→Actions→Workflow permissions 为 Read and write"

      - uses: actions/upload-artifact@v4
        if: always() && steps.guard.outputs.run == 'true'
        with:
          name: fund-report-${{ github.run_id }}
          path: output/
          retention-days: 30
